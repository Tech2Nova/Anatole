{{ $password := .Params.password }}
{{ $content := .Content }}
{{ $encodedContent := $content | base64Encode }}
{{ $slug := .File.BaseFileName | default (replace .Title " " "-") | lower }}
{{ $storageKey := print "post_password_" $slug }}

<style>
.post-password-lock {
  background: var(--card-bg, #f8f9fa);
  border: 1px solid var(--border-color, #e9ecef);
  border-radius: 12px;
  padding: 40px 30px;
  text-align: center;
  margin: 30px 0;
}
.theme--dark .post-password-lock {
  background: var(--card-bg, #1e293b);
  border-color: var(--border-color, #334155);
}
.post-password-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.post-password-hint {
  font-size: 15px;
  color: var(--text-muted, #6c757d);
  margin-bottom: 24px;
}
.post-password-form {
  display: flex;
  gap: 10px;
  justify-content: center;
  max-width: 320px;
  margin: 0 auto;
}
.post-password-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border-color, #ced4da);
  border-radius: 8px;
  font-size: 14px;
  background: var(--input-bg, #fff);
  color: var(--text-color, #212529);
  outline: none;
}
.post-password-input:focus {
  border-color: #6366f1;
}
.post-password-btn {
  padding: 10px 20px;
  background: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.post-password-btn:hover {
  background: #4f46e5;
}
.post-password-error {
  color: #f87171;
  font-size: 13px;
  margin-top: 14px;
  display: none;
}
.post-password-error.show {
  display: block;
}
</style>

<div class="post-password-wrapper" data-key="{{ $storageKey }}" data-password="{{ $password }}" data-content="{{ $encodedContent }}">
  <div class="post-password-lock" id="post-password-lock-{{ $slug }}">
    <div class="post-password-icon">🔒</div>
    <p class="post-password-hint">此文章需要密码访问</p>
    <div class="post-password-form">
      <input
        type="password"
        class="post-password-input"
        id="post-password-input-{{ $slug }}"
        placeholder="请输入密码"
        autocomplete="off"
      />
      <button class="post-password-btn" onclick="unlockPost('{{ $slug }}')">验证</button>
    </div>
    <p class="post-password-error" id="post-password-error-{{ $slug }}">密码错误，请重试</p>
  </div>
  <div class="post-password-content" id="post-password-content-{{ $slug }}" style="display: none;"></div>
</div>

<script>
(function() {
  var slug = "{{ $slug }}";
  var storageKey = "{{ $storageKey }}";
  var correctPassword = "{{ $password }}";
  var encodedContent = "{{ $encodedContent }}";

  if (sessionStorage.getItem(storageKey) === correctPassword) {
    showContent(slug, encodedContent);
  }

  window.unlockPost = window.unlockPost || function(slug) {
    var correctPassword = document.querySelector('[id="post-password-lock-' + slug + '"]').parentNode.dataset.password;
    var encodedContent = document.querySelector('[id="post-password-lock-' + slug + '"]').parentNode.dataset.content;
    var input = document.getElementById("post-password-input-" + slug);
    var error = document.getElementById("post-password-error-" + slug);
    error.classList.remove("show");

    if (input.value === correctPassword) {
      sessionStorage.setItem("post_password_" + slug, correctPassword);
      showContent(slug, encodedContent);
    } else {
      error.classList.add("show");
      input.value = "";
      input.focus();
    }
  };

  function showContent(slug, encodedContent) {
    var lock = document.getElementById("post-password-lock-" + slug);
    var content = document.getElementById("post-password-content-" + slug);
    if (lock) lock.style.display = "none";
    if (content) {
      content.innerHTML = decodeURIComponent(escape(atob(encodedContent)));
      content.style.display = "block";
      // 触发可能的代码高亮
      if (window.hljs) {
        content.querySelectorAll('pre code').forEach(function(block) {
          window.hljs.highlightBlock(block);
        });
      }
    }
  }

  // 回车提交
  var input = document.getElementById("post-password-input-" + slug);
  if (input) {
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") unlockPost(slug);
    });
  }
})();
</script>
